name: Promote dev → main

# Manual "Run workflow" button (Actions tab) that promotes dev into main,
# which is what triggers the Vercel production deploy.
#
# Restriction: GitHub has no native per-user gate on the dispatch button —
# anyone with write access can see it — so the first step fails the run for
# any actor other than the authorized maintainer below.
on:
  workflow_dispatch:
    inputs:
      pr_title:
        description: "Title for the promotion PR"
        required: false
        default: "Promote dev → main"

permissions:
  contents: write
  pull-requests: write

env:
  AUTHORIZED_ACTOR: AdrianLlopart

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Authorize dispatcher
        if: ${{ github.actor != 'AdrianLlopart' }}
        run: |
          echo "::error::Only @${{ env.AUTHORIZED_ACTOR }} may run this workflow (actor: @${{ github.actor }})."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open and merge promote PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin main dev --quiet

          if [ -z "$(git rev-list origin/main..origin/dev)" ]; then
            echo "main is already up to date with dev — nothing to promote."
            exit 0
          fi

          # Reuse an open dev → main PR if one exists, otherwise create it.
          pr="$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')"
          if [ -z "$pr" ]; then
            url="$(gh pr create --base main --head dev \
              --title "${{ inputs.pr_title }}" \
              --body "Automated promotion of \`dev\` → \`main\`, dispatched by @${{ github.actor }}.")"
            pr="${url##*/}"
          fi

          echo "Merging promotion PR #$pr"
          gh pr merge "$pr" --merge --delete-branch=false
